{%extends 'parent.html'%}
{%block title%}
    Books
{%endblock%}
 {%block content%}
    <table style="border 1px solid" width="100%">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Price</th>
            <th>Actions</th>
        </tr>
        {%for book in books%}
            <tr>
                <td>{{book.id}}</td>
                <td>{{book.name}}</td>
                <td>{{book.price}}</td>
                <td>
                    <a href="{%url 'Book_get_id' book.id%}">show</a>
                    <a href="{%url 'Book_update' book.id%}">Update</a>
                </td>
            </tr>

    </br>
    {%endfor%}
    </table>

{%endblock%}
